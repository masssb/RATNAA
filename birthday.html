<!DOCTYPE html><html lang='id'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Untuk Ratnaa</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#ffd6e8,#fff);overflow-x:hidden}
.wrap{max-width:900px;margin:auto;padding:20px}
.card{background:#fff;padding:25px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.15)}
.gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.gallery img{width:100%;height:220px;object-fit:cover;border-radius:15px}
#typing{white-space:pre-line;line-height:1.8}
.heart{position:fixed;top:-20px;animation:f 6s linear forwards}
@keyframes f{to{transform:translateY(110vh);opacity:0}}
</style></head><body>
<div class='wrap'><div class='card'>
<h1>🎂 Happy Birthday Ratnaa ❤️</h1>
<div class='gallery'>
<img src='foto1.jpg'><img src='foto2.jpg'><img src='foto3.jpg'><img src='foto4.jpg'>
</div>
<p id='typing'></p>
</div></div>
<audio id='musik' loop><source src='lagu.mp3' type='audio/mpeg'></audio>
<script>
const p=`🎂 Happy Birthday Ratnaa ❤️

Selamat ulang tahun ya Ratnaa!

Semoga selalu sehat, bahagia, dan semua cita-citamu tercapai.

Semangat terus menjalani kelas 12.
Aku tahu tugas, ujian, dan perjuangannya tidak mudah.

Percayalah, semua usaha yang kamu lakukan hari ini akan membawamu ke masa depan yang indah.

Jangan menyerah.
Tetap tersenyum.
Tetap percaya pada dirimu sendiri.

Semoga nilai ujianmu memuaskan dan kamu diterima di tempat yang kamu impikan.

Terima kasih sudah menjadi pribadi yang baik.

Enjoy your special day!

— Bintang Sandy Aji 🤍`;
let i=0;
(function t(){if(i<p.length){typing.innerHTML+=p.charAt(i++);setTimeout(t,30)}})();
if(localStorage.getItem('playMusic')){musik.play().catch(()=>{});}
setInterval(()=>{
let h=document.createElement('div');
h.className='heart';h.innerHTML='❤️';
h.style.left=Math.random()*100+'vw';
h.style.fontSize=(20+Math.random()*20)+'px';
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},300);
</script></body></html>

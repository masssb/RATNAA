<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Happy Birthday Ratnaa ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff9ec4,#ffd6e8,#fff0f6);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow-x:hidden;
    animation:bg 8s ease infinite alternate;
}

@keyframes bg{
    from{
        background-position:left;
    }
    to{
        background-position:right;
    }
}

.container{
    width:90%;
    max-width:900px;
    padding:20px;
}

.card{
    background:white;
    border-radius:25px;
    padding:25px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#ff4f81;
    margin-bottom:20px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    margin-bottom:25px;
}

.gallery img{
    width:100%;
    height:240px;
    object-fit:cover;
    border-radius:18px;
    transition:.4s;
}

.gallery img:hover{
    transform:scale(1.03);
}

#typing{
    white-space:pre-line;
    line-height:1.8;
    font-size:17px;
    color:#444;
}

.note{
    margin-top:30px;
    background:#fff4f8;
    padding:15px;
    border-radius:15px;
    text-align:center;
    color:#555;
}

.heart{
    position:fixed;
    color:#ff5d8f;
    animation:fall linear forwards;
    top:-20px;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}

@media(max-width:600px){

.gallery{
grid-template-columns:1fr;
}

.gallery img{
height:220px;
}

}
</style>

</head>
<body>

<div class="container">

<div class="card">

<h1>🎉 Happy Birthday Ratnaa ❤️</h1>

<div class="gallery">
<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
<img src="foto4.jpg">
</div>

<p id="typing"></p>

<div class="note">
❤️ Semoga hari ini penuh kebahagiaan, tawa, dan kenangan indah. ❤️
</div>

</div>

</div>

<audio id="musik" loop>
<source src="lagu.mp3" type="audio/mpeg">
</audio>

<script>

const pesan = `🎂 Happy Birthday Ratnaa ❤️

Selamat ulang tahun ya, Ratnaa.

Semoga di umurmu yang sekarang, semua doa baikmu satu per satu dikabulkan oleh Tuhan.

Semoga selalu diberikan kesehatan, kebahagiaan, umur yang panjang, rezeki yang melimpah, dan selalu dikelilingi oleh orang-orang yang menyayangimu.

Hari ini bukan hanya bertambah usia, tapi juga bertambah kesempatan untuk menjadi pribadi yang lebih hebat dari sebelumnya.

Aku juga ingin kasih semangat buat kamu yang sekarang lagi berjuang di kelas 12.

Aku tahu perjalananmu nggak mudah.
Ada tugas yang menumpuk, ujian yang semakin dekat, rasa capek, rasa bosan, bahkan mungkin ada saat-saat di mana kamu ingin menyerah.

Tapi percayalah...

Semua perjuangan yang kamu lakukan hari ini nggak akan sia-sia.

Tetap semangat belajar ya.

Jangan takut kalau nilaimu belum sempurna.

Karena kesuksesan bukan tentang siapa yang paling pintar,
melainkan siapa yang tetap berusaha meskipun berkali-kali merasa lelah.

Aku yakin kamu bisa melewati semuanya.

Semoga nanti kamu mendapatkan hasil ujian terbaik.

Semoga semua cita-cita yang kamu impikan tercapai.

Terus jadi Ratnaa yang baik hati,
yang selalu murah senyum,
yang selalu membuat orang lain nyaman berada di dekatmu.

Jangan lupa istirahat kalau capek.

Jangan lupa makan.

Jangan lupa jaga kesehatan.

Dan yang paling penting...

Jangan pernah berhenti percaya sama dirimu sendiri.

Karena kamu jauh lebih hebat daripada yang kamu pikirkan.

Terima kasih sudah menjadi seseorang yang begitu luar biasa.

Semoga di tahun ini banyak kebahagiaan, banyak keberuntungan, dan banyak hal indah yang datang dalam hidupmu.

Sekali lagi...

🎉 Happy Birthday Ratnaa ❤️

Selamat menikmati hari spesialmu.

Semoga senyummu hari ini menjadi awal dari kebahagiaan yang akan terus menemanimu setiap hari.

From someone who wishes you all the best...

— Bintang Sandy Aji 🤍`;

let i = 0;

function ketik(){

if(i < pesan.length){

document.getElementById("typing").innerHTML += pesan.charAt(i);

i++;

setTimeout(ketik,35);

}

}

ketik();

document.addEventListener("click",function(){

document.getElementById("musik").play();

},{once:true});

function hati(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*20)+"px";

heart.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},7000);

}

setInterval(hati,350);

</script>

</body>
</html>
